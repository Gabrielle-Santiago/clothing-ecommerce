<header class="toolbar">

  <div class="toolbar__brand">

    <div class="toolbar__logo">
      <img src="assets/icons/logo.svg" alt="Logo">
    </div>

    <span class="toolbar__brand-name"> Elegance </span>

  </div>

  <nav class="toolbar__navigation">

    <a routerLink="/news" class="toolbar__nav-link"> Novidades </a>
    <a routerLink="/collections" class="toolbar__nav-link"> Coleções </a>

  </nav>

  <div class="toolbar__actions">
    <div class="toolbar__search-group">

      <svg class="toolbar__search-icon" aria-hidden="true" viewBox="0 0 24 24">
        <g>
          <path
            d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
          />
        </g>
      </svg>

      <input type="search" class="toolbar__search-input" placeholder="Pesquisar"/>

    </div>

    <button type="button" class="toolbar__icon-button" aria-label="Perfil">
      <img class="toolbar__icon-user" src="assets/icons/user.svg" alt="User profile">
    </button>

    <button type="button" class="toolbar__icon-button" aria-label="Carrinho">
      <img class="toolbar__icon-bag" src="assets/icons/shopping-bag.svg" alt="Shopping bag">
    </button>

    <div class="toolbar__menu">
      <input type="checkbox" id="menu-toggle" class="toolbar__menu-toggle" />

      <label class="toolbar__burger" for="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <div class="toolbar__dropdown">
        <a href="#"> Suporte </a>
        <a href="#"> Sobre </a>
        <a href="#"> Afiliar-se </a>
      </div>
    </div>
  </div>

</header>
